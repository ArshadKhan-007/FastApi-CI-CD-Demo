services:
  app:
    image: arshadkhan007/task-engine-v1:v2
    ports:
      - "8000:8000"
    container_name: task-app-compose
    restart: always

  mysql:
    image: mysql:latest
    container_name: mysql-container
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
    ports:
      - 3306:3306
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
